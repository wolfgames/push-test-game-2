# ─── VIEWPORT BUDGET ────────────────────────────────────────────────────────
# Sources:
#   - pipeline-context.yml dom-overlays[0].total_reserved_px = 56   (WolfGamesLogo)
#   - pipeline-context.yml prime.carry_forward.reserved_bottom_px = 56
#   - pipeline-context.yml prime.carry_forward.reserved_top_px = 0
#   - GDD: top ~15% HUD, mid ~70% board, bottom ~15% pause/hint
#   - Target device: 390×844 portrait (iPhone reference)

viewport_budget:
  default:
    # Portrait 390×844. DOM logo occupies bottom 56px.
    screen_h: 844
    screen_w: 390
    dom_reserved_top: 0
    dom_reserved_bottom: 56        # WolfGamesLogo (src/game/screens/GameScreen.tsx, line 47)
    hud_top_px: 120                # GPU HUD top band (Evidence Meter + move counter + companion strip)
    bottom_band_px: 80             # GPU bottom band (pause button + hint button; ≥44px targets)
    board_height_px: 580           # 844 - 120 - 80 - 56 = 588 → 580 with 4px top+bottom inset
    board_width_px: 374            # 390 - 8px side padding × 2 = 374
    # Grid sizing — 7 cols × 9 rows
    cols: 7
    rows: 9
    cell_gap_px: 2
    cell_size_px: 52               # (374 - 2*6) / 7 = (374 - 12) / 7 = 51.7 → 52px; ≥44 ✓
    grid_width_px: 376             # 52*7 + 2*6 = 364 + 12 = 376; within 374+2 tolerance ✓
    grid_height_px: 476            # 52*9 + 2*8 = 468 + 16 = 484 → fits in 580 ✓
    tile_art_px: 42                # ~80% of 52px cell; ≥24px icon ✓
    min_touch_target_px: 52        # cell_size ≥ 44 ✓
    total_gpu_used: 300            # 120 + 80 + 100 (board top inset + grid)
    note: "cell_size 52px satisfies ≥44px touch target; tile art 42px satisfies ≥24px icon floor"
  tutorial:
    # Tutorial level 1: 4-col × 5-row sub-grid shown on the same 7×9 board.
    # Non-tutorial cells are dimmed. Cell size is identical — no layout change.
    cols: 4
    rows: 5
    cell_size_px: 52               # same as default; board unchanged
    note: "Tutorial sub-grid uses same board dimensions — only active cell set changes"

# ─── RESOLVED QUESTIONS ─────────────────────────────────────────────────────

resolved_questions:
  - question: "oq-1: What is the resolved game slug?"
    decision: "clue-connect"
    rationale: >
      GDD refers to 'myscooby' in level generator section but that was an illustrative
      placeholder. The game title is 'Mystery Inc. Mash: Clue Connect'. Core mechanic
      is chain-connecting clues. Slug 'clue-connect' is directory-safe (kebab, ≤30 chars),
      distinct, and descriptive. Game root: src/game/clue-connect/.

  - question: "oq-2: Scooby Snack coin earn rate per level?"
    decision: "base 10 coins per level + 5 per star earned (max 25 coins/level)"
    rationale: >
      GDD does not specify. Core pass needs a concrete number to implement the coin counter
      on the Level Complete screen and deduct hint/continue costs. Base 10 + star bonus
      (5×stars) is a standard hypercasual economy that avoids instant saturation (hint=1 coin,
      continue=5 coins). This value is easily tunable via tuning.ts.

  - question: "oq-3: Watch Ad path — real or mock for core pass?"
    decision: "mock for core pass; ad SDK integration is meta-pass scope"
    rationale: >
      Core pass ships the base game mechanic. Ad integration requires SDK, privacy policy,
      and store compliance — all meta-pass concerns. Core pass implements the Watch Ad button
      as a no-op stub that logs 'AD_MOCK' and grants +5 moves directly (as if ad completed).
      This keeps the loss screen functional and testable without a real SDK.

  - question: "oq-4: Companion portrait rotation logic?"
    decision: "Scooby always on level-start and win. Chapter-level assignment: Ch1=Velma, Ch2=Shaggy, Ch3=Fred, Ch4=Daphne. Positive chain: thumbs-up expression. Bad state (2 moves left): worried expression."
    rationale: >
      GDD specifies Scooby for level-start and unmask lines. Gang member rotation per chapter
      is the simplest way to keep each character relevant without complex dynamic selection logic.
      Reaction expressions (positive/worried/neutral) are triggered by ECS events.

  - question: "oq-5: Hint algorithm?"
    decision: "longest valid chain from current board state (greedy BFS from each cell, pick the chain with most tiles)"
    rationale: >
      GDD says hint highlights 'a valid chain'. Longest chain maximizes player reward (more
      evidence fill) and is the most useful hint. Greedy BFS is O(N*6) where N=63 cells —
      well within one frame budget. Ties broken by topmost-leftmost starting cell.

