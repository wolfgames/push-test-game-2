risk_areas:
  - feature: game-controller
    reason: "Central integration point — wires ECS, Pixi, all renderers, input, and win/loss conditions. A wrong integration order (e.g. ECS created before Pixi, or bridge set up before app.init) silently breaks rendering or ECS→signal reactivity."

  - feature: 7x9-grid-layout
    reason: "Changes viewport layout logic and adds new UI elements. Board + HUD + bottom band must fit within 390x844 safe area without overlap, with WolfGamesLogo reserved bottom 56px."

  - feature: tap-drag-chain-interaction
    reason: "Primary interaction is the core loop. Pointer capture, touch-action:none, input queueing during ANIMATING, and chain unwind must all work correctly on mobile. Missing any of these silently breaks gameplay."

open_questions:
  - id: oq-1
    question: "What is the resolved game slug (directory name under src/game/)?"
    context: "GDD refers to 'myscooby' in the level generator section (src/game/myscooby/data/handcrafted-levels.json), but plan phase owns q-game-name resolution. analyze phase does not infer the slug."

  - id: oq-2
    question: "What is the exact Scooby Snack coin earn rate per level (base award before star bonus)?"
    context: "GDD mentions 'total Scooby Snack coins earned' on Level Complete screen and coins as continue/hint currency, but does not specify earn rate formula or star bonus amounts."

  - id: oq-3
    question: "Does the Watch Ad (+5 moves) path require an actual ad integration or a mock for core pass?"
    context: "GDD specifies 'Watch Ad (+5 moves)' on loss screen. Core pass likely uses a mock/bypass. Clarification needed for plan phase to scope ad SDK integration."

  - id: oq-4
    question: "What is the companion portrait animation trigger logic (which gang member shows when)?"
    context: "GDD says 'one gang member portrait reacts to good/bad moves' and 'Scooby delivers level-start and unmask lines', but does not specify the rotation/selection logic for Fred, Daphne, Velma, Shaggy during gameplay."

  - id: oq-5
    question: "How does the hint mechanic identify the 'best' chain to highlight?"
    context: "GDD mentions 'hint button (bottom-right, costs 1 Scooby Snack coin)' but does not specify hint algorithm (longest chain? highest evidence fill? specific tile type priority?)."
